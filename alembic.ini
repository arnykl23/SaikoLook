# Alembic 設定（最小）.
# DB URL は env.py が app.config.Settings.database_url から読むため,
# ここには秘密情報・接続文字列を書かない（sqlalchemy.url は env.py が設定する）.

[alembic]
script_location = migrations
prepend_sys_path = .
# revision ファイル名: タイムスタンプ + slug で並びを安定させる.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
